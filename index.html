<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>분리배출 마스터! - AI 에디션</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
        
        body {
            font-family: 'Jua', sans-serif;
            background-color: #f0fdf4;
            touch-action: manipulation;
        }

        .hole {
            position: relative;
            background: #5d4037;
            border-radius: 50%;
            box-shadow: inset 0 10px 0 rgba(0,0,0,0.3);
            overflow: hidden;
            aspect-ratio: 1 / 1;
        }

        .waste-item {
            position: absolute;
            bottom: -120%;
            left: 50%;
            transform: translateX(-50%);
            transition: bottom 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 90%;
            height: 90%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 6rem;
            cursor: pointer;
            user-select: none;
            z-index: 5;
        }

        .waste-item.up {
            bottom: 5%;
        }

        .bin-btn {
            transition: transform 0.1s;
        }

        .bin-btn:active {
            transform: scale(0.9);
        }

        .feedback {
            position: fixed;
            pointer-events: none;
            z-index: 60;
            animation: float-up 0.8s ease-out forwards;
            font-weight: bold;
            font-size: 2rem;
        }

        @keyframes float-up {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-70px); opacity: 0; }
        }

        /* AI Chat Styling */
        .ai-chat-bubble {
            background: white;
            border-radius: 20px;
            padding: 10px 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            position: relative;
            max-width: 80%;
            margin: 10px auto;
            border: 2px solid #10b981;
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <!-- Header -->
    <header class="bg-green-600 text-white p-4 shadow-lg text-center">
        <h1 class="text-3xl">♻️ 분리배출 마스터! ✨AI</h1>
        <p class="text-sm opacity-90">더 커진 쓰레기! AI와 함께 배우는 분리배출</p>
    </header>

    <!-- UI Overlay -->
    <div class="flex justify-around p-4 bg-white shadow-md mb-4 sticky top-0 z-10">
        <div class="text-center">
            <p class="text-gray-500 text-sm">점수</p>
            <p id="score" class="text-2xl font-bold text-green-600">0</p>
        </div>
        <div class="text-center">
            <p class="text-gray-500 text-sm">남은 시간</p>
            <p id="timer" class="text-2xl font-bold text-red-500">30</p>
        </div>
        <button id="ai-help-btn" onclick="askAiGuide()" class="bg-purple-100 text-purple-700 px-3 py-1 rounded-full text-xs font-bold border border-purple-300">
            ✨ AI 가이드
        </button>
    </div>

    <!-- Game Board -->
    <main class="flex-grow container mx-auto px-4 max-w-2xl">
        <div id="ai-message-area" class="h-16 mb-2 overflow-hidden">
            <div id="ai-status" class="text-center text-sm text-green-700 italic">게임을 시작하면 AI가 도와줄 거예요!</div>
        </div>

        <div id="game-board" class="grid grid-cols-3 gap-6 mb-8">
            <!-- 9 Holes generated by JS -->
        </div>

        <!-- Bin Controls -->
        <div class="grid grid-cols-5 gap-2 pb-8" id="controls">
            <button onclick="checkSelection('plastic')" class="bin-btn bg-blue-500 text-white p-2 rounded-lg flex flex-col items-center shadow-md">
                <span class="text-xl">🥤</span>
                <span class="text-xs">플라스틱</span>
            </button>
            <button onclick="checkSelection('paper')" class="bin-btn bg-yellow-500 text-white p-2 rounded-lg flex flex-col items-center shadow-md">
                <span class="text-xl">📦</span>
                <span class="text-xs">종이</span>
            </button>
            <button onclick="checkSelection('can')" class="bin-btn bg-gray-500 text-white p-2 rounded-lg flex flex-col items-center shadow-md">
                <span class="text-xl">🥫</span>
                <span class="text-xs">캔/금속</span>
            </button>
            <button onclick="checkSelection('glass')" class="bin-btn bg-emerald-500 text-white p-2 rounded-lg flex flex-col items-center shadow-md">
                <span class="text-xl">🍾</span>
                <span class="text-xs">유리</span>
            </button>
            <button onclick="checkSelection('general')" class="bin-btn bg-orange-700 text-white p-2 rounded-lg flex flex-col items-center shadow-md">
                <span class="text-xl">🗑️</span>
                <span class="text-xs">일반</span>
            </button>
        </div>
    </main>

    <!-- Overlay -->
    <div id="overlay" class="fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-50 text-center text-white px-6">
        <div id="start-screen">
            <h2 class="text-4xl mb-4">지구를 지켜라!</h2>
            <p class="mb-6 text-lg">쓰레기가 큼직하게 나타납니다.<br>AI와 함께 분리배출 고수가 되어보세요.</p>
            <button onclick="startGame()" class="bg-green-500 hover:bg-green-600 px-10 py-4 rounded-full text-2xl font-bold transition transform hover:scale-105">
                게임 시작
            </button>
        </div>
        
        <div id="game-over-screen" class="hidden w-full max-w-md">
            <h2 class="text-4xl mb-2 text-yellow-400">Time Over!</h2>
            <p class="text-xl mb-4">최종 점수: <span id="final-score" class="text-3xl font-bold">0</span>점</p>
            
            <div id="ai-quiz-container" class="bg-white text-gray-800 p-4 rounded-xl mb-6 shadow-inner hidden">
                <h3 class="font-bold text-green-700 mb-2 border-b pb-1">✨ AI 특별 퀴즈</h3>
                <div id="ai-quiz-content" class="text-sm mb-3">질문을 생성 중입니다...</div>
                <div id="ai-quiz-options" class="grid grid-cols-1 gap-2"></div>
            </div>

            <div id="grade-message" class="mb-6 text-green-300"></div>
            
            <div class="flex flex-col gap-3">
                <button id="gen-quiz-btn" onclick="generateAiQuiz()" class="bg-purple-500 hover:bg-purple-600 px-6 py-3 rounded-full font-bold transition transform hover:scale-105">
                    ✨ AI 분리배출 퀴즈 받기
                </button>
                <button onclick="startGame()" class="bg-blue-500 hover:bg-blue-600 px-6 py-3 rounded-full font-bold transition transform hover:scale-105">
                    다시 도전하기
                </button>
            </div>
        </div>
    </div>

    <script>
        const apiKey = ""; // Gemini API Key
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'sorting-master-ai';

        const wasteData = [
            { emoji: '🥤', type: 'plastic', name: '생수병' },
            { emoji: '🧴', type: 'plastic', name: '세제통' },
            { emoji: '📦', type: 'paper', name: '택배박스' },
            { emoji: '📰', type: 'paper', name: '신문' },
            { emoji: '🥫', type: 'can', name: '참치캔' },
            { emoji: '🥤', type: 'can', name: '음료수캔' },
            { emoji: '🍾', type: 'glass', name: '와인병' },
            { emoji: '🥃', type: 'glass', name: '유리컵' },
            { emoji: '🍌', type: 'general', name: '바나나껍질' },
            { emoji: '🚬', type: 'general', name: '담배꽁초' },
            { emoji: '🧸', type: 'general', name: '인형' }
        ];

        let score = 0;
        let timeLeft = 30;
        let gameTimer;
        let wasteTimer;
        let activeWaste = null;
        let activeHole = null;
        let isGameRunning = false;

        const board = document.getElementById('game-board');
        const scoreDisplay = document.getElementById('score');
        const timerDisplay = document.getElementById('timer');
        const overlay = document.getElementById('overlay');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const finalScoreDisplay = document.getElementById('final-score');
        const gradeMessage = document.getElementById('grade-message');
        const aiStatus = document.getElementById('ai-status');

        for (let i = 0; i < 9; i++) {
            const hole = document.createElement('div');
            hole.classList.add('hole');
            hole.id = `hole-${i}`;
            const item = document.createElement('div');
            item.classList.add('waste-item');
            hole.appendChild(item);
            board.appendChild(hole);
        }

        const holes = document.querySelectorAll('.hole');
        const items = document.querySelectorAll('.waste-item');

        function getRandomHole() {
            const idx = Math.floor(Math.random() * holes.length);
            const hole = holes[idx];
            if (hole === activeHole) return getRandomHole();
            return hole;
        }

        function showWaste() {
            if (!isGameRunning) return;

            const hole = getRandomHole();
            const waste = wasteData[Math.floor(Math.random() * wasteData.length)];
            const itemElement = hole.querySelector('.waste-item');

            itemElement.textContent = waste.emoji;
            itemElement.classList.add('up');
            activeWaste = waste;
            activeHole = hole;

            const baseUpTime = 3000; 
            const upTime = Math.max(1500, baseUpTime - (score * 30));

            setTimeout(() => {
                if (itemElement.classList.contains('up') && activeWaste === waste) {
                    itemElement.classList.remove('up');
                }
                if (isGameRunning) {
                    const baseDelay = 1600;
                    const nextDelay = Math.max(500, baseDelay - (score * 15));
                    wasteTimer = setTimeout(showWaste, nextDelay);
                }
            }, upTime);
        }

        function checkSelection(type) {
            if (!isGameRunning || !activeWaste) return;

            const itemElement = activeHole.querySelector('.waste-item');
            if (!itemElement.classList.contains('up')) return;

            if (activeWaste.type === type) {
                score += 10;
                showFeedback('+10', 'text-green-500');
                aiStatus.textContent = `잘했어요! ${activeWaste.name}은(는) ${type}이 맞아요.`;
            } else {
                score = Math.max(0, score - 5);
                showFeedback('오답! -5', 'text-red-500');
                aiStatus.textContent = `틀렸어요! ${activeWaste.name}은(는) ${activeWaste.type}에 버려야 해요.`;
            }

            scoreDisplay.textContent = score;
            itemElement.classList.remove('up');
            activeWaste = null;
        }

        function showFeedback(text, colorClass) {
            const fb = document.createElement('div');
            fb.textContent = text;
            fb.className = `feedback ${colorClass}`;
            fb.style.left = '50%';
            fb.style.top = '30%';
            document.body.appendChild(fb);
            setTimeout(() => fb.remove(), 1000);
        }

        async function geminiCall(prompt, systemInstruction) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: systemInstruction }] },
                generationConfig: {
                    responseMimeType: "application/json"
                }
            };

            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    const data = await response.json();
                    return JSON.parse(data.candidates[0].content.parts[0].text);
                } catch (e) {
                    await new Promise(resolve => setTimeout(resolve, Math.pow(2, i) * 1000));
                }
            }
            throw new Error("Gemini API 호출 실패");
        }

        async function askAiGuide() {
            if (!activeWaste) {
                aiStatus.textContent = "지금은 쓰레기가 없어요!";
                return;
            }
            
            aiStatus.textContent = "✨ AI 분석 중...";
            const currentWaste = activeWaste.name;
            
            try {
                const prompt = `${currentWaste}의 분리배출 방법과 주의사항을 한 문장으로 친절하게 알려줘.`;
                const system = "당신은 환경 보호 전문가입니다. 한국어로 답변하세요. JSON 형식으로 답변하되 { 'answer': '설명' } 구조를 유지하세요.";
                const result = await geminiCall(prompt, system);
                aiStatus.textContent = `✨ AI: ${result.answer}`;
            } catch (e) {
                aiStatus.textContent = "AI가 잠시 자리를 비웠어요!";
            }
        }

        async function generateAiQuiz() {
            const btn = document.getElementById('gen-quiz-btn');
            const container = document.getElementById('ai-quiz-container');
            const content = document.getElementById('ai-quiz-content');
            const optionsDiv = document.getElementById('ai-quiz-options');
            
            btn.disabled = true;
            btn.textContent = "✨ 퀴즈 생성 중...";
            container.classList.remove('hidden');
            content.textContent = "Gemini가 맞춤형 환경 퀴즈를 만들고 있습니다...";
            optionsDiv.innerHTML = "";

            try {
                const prompt = `사용자가 방금 게임에서 ${score}점을 얻었어. 분리배출 관련 흥미로운 퀴즈 하나를 만들어줘. 
                질문 하나와 보기 3개(객관식), 정답 인덱스(0-2), 그리고 짧은 해설을 포함해야 해.`;
                const system = `당신은 퀴즈 마스터입니다. JSON 형식으로 응답하세요: 
                { "question": "질문 내용", "options": ["보기1", "보기2", "보기3"], "correctIndex": 0, "explanation": "해설" }`;
                
                const quiz = await geminiCall(prompt, system);
                
                content.textContent = quiz.question;
                quiz.options.forEach((opt, idx) => {
                    const b = document.createElement('button');
                    b.className = "w-full p-2 bg-green-50 rounded text-left hover:bg-green-100 border border-green-200 transition";
                    b.textContent = opt;
                    b.onclick = () => {
                        if (idx === quiz.correctIndex) {
                            content.innerHTML = `<span class="text-blue-600 font-bold">정답입니다!</span><br>${quiz.explanation}`;
                        } else {
                            content.innerHTML = `<span class="text-red-600 font-bold">아쉬워요!</span><br>정답은 '${quiz.options[quiz.correctIndex]}'입니다.<br>${quiz.explanation}`;
                        }
                        optionsDiv.innerHTML = "";
                    };
                    optionsDiv.appendChild(b);
                });
                btn.classList.add('hidden');
            } catch (e) {
                content.textContent = "퀴즈를 가져오지 못했습니다. 다시 시도해 주세요.";
                btn.disabled = false;
                btn.textContent = "✨ AI 퀴즈 다시 받기";
            }
        }

        function startGame() {
            score = 0;
            timeLeft = 30;
            isGameRunning = true;
            scoreDisplay.textContent = score;
            timerDisplay.textContent = timeLeft;
            aiStatus.textContent = "게임을 시작합니다! 지구를 구해주세요!";

            overlay.classList.add('hidden');
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            document.getElementById('ai-quiz-container').classList.add('hidden');
            document.getElementById('gen-quiz-btn').classList.remove('hidden');
            document.getElementById('gen-quiz-btn').disabled = false;
            document.getElementById('gen-quiz-btn').textContent = "✨ AI 분리배출 퀴즈 받기";

            gameTimer = setInterval(() => {
                timeLeft--;
                timerDisplay.textContent = timeLeft;
                if (timeLeft <= 0) endGame();
            }, 1000);

            showWaste();
        }

        function endGame() {
            isGameRunning = false;
            clearInterval(gameTimer);
            clearTimeout(wasteTimer);
            items.forEach(item => item.classList.remove('up'));
            overlay.classList.remove('hidden');
            gameOverScreen.classList.remove('hidden');
            finalScoreDisplay.textContent = score;

            let message = "";
            if (score >= 100) message = "🌿 당신은 환경 지킴이 마스터!";
            else if (score >= 50) message = "🌱 분리배출을 잘 이해하고 있어요!";
            else message = "🌏 다음엔 조금 더 빨리 맞춰보세요!";
            gradeMessage.textContent = message;
        }
    </script>
</body>
</html>
