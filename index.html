<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>분리배출 마스터! - AI 에디션</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
        
        body {
            font-family: 'Jua', sans-serif;
            background-color: #f0fdf4;
            touch-action: manipulation;
        }

        .hole {
            position: relative;
            background: #5d4037;
            border-radius: 50%;
            box-shadow: inset 0 10px 0 rgba(0,0,0,0.3);
            overflow: hidden;
            aspect-ratio: 1 / 1;
        }

        .waste-item {
            position: absolute;
            bottom: -120%;
            left: 50%;
            transform: translateX(-50%);
            transition: bottom 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 95%;
            height: 95%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            user-select: none;
            z-index: 5;
        }

        .waste-emoji {
            font-size: 4.5rem;
            line-height: 1;
        }

        .waste-label {
            font-size: 1rem;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 2px 10px;
            border-radius: 12px;
            margin-top: -5px;
            white-space: nowrap;
        }

        .waste-item.up {
            bottom: 10%;
        }

        /* 하단 컨트롤바 버튼 스타일 수정 (1.5배 크기 적용) */
        .bin-btn {
            transition: transform 0.1s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 12px 6px; /* 패딩 증가 */
            border-radius: 16px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            min-height: 90px; /* 최소 높이 확보 */
        }

        .bin-btn:active {
            transform: scale(0.9);
        }

        /* 아이콘 크기 1.5배 (기존 text-xl -> text-3xl 상당) */
        .bin-icon {
            font-size: 2.25rem; 
            margin-bottom: 4px;
        }

        /* 글자 크기 1.5배 (기존 10px -> 15px 상당) */
        .bin-text {
            font-size: 0.95rem;
            font-weight: bold;
            line-height: 1.2;
        }

        .feedback {
            position: fixed;
            pointer-events: none;
            z-index: 60;
            animation: float-up 0.8s ease-out forwards;
            font-weight: bold;
            font-size: 2rem;
            text-shadow: 2px 2px 0 white;
        }

        @keyframes float-up {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-70px); opacity: 0; }
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <!-- Header -->
    <header class="bg-green-600 text-white p-4 shadow-lg text-center">
        <h1 class="text-3xl">♻️ 분리배출 마스터! ✨AI</h1>
        <p class="text-sm opacity-90">더 커진 버튼으로 정확하게 분리수거하세요!</p>
    </header>

    <!-- UI Overlay -->
    <div class="flex justify-around p-4 bg-white shadow-md mb-4 sticky top-0 z-10">
        <div class="text-center">
            <p class="text-gray-500 text-sm">점수</p>
            <p id="score" class="text-2xl font-bold text-green-600">0</p>
        </div>
        <div class="text-center">
            <p class="text-gray-500 text-sm">남은 시간</p>
            <p id="timer" class="text-2xl font-bold text-red-500">30</p>
        </div>
        <button id="ai-help-btn" onclick="askAiGuide()" class="bg-purple-100 text-purple-700 px-3 py-1 rounded-full text-xs font-bold border border-purple-300">
            ✨ AI 가이드
        </button>
    </div>

    <!-- Game Board -->
    <main class="flex-grow container mx-auto px-4 max-w-2xl">
        <div id="ai-message-area" class="h-16 mb-2 overflow-hidden">
            <div id="ai-status" class="text-center text-sm text-green-700 italic">게임을 시작하면 AI가 도와줄 거예요!</div>
        </div>

        <div id="game-board" class="grid grid-cols-3 gap-6 mb-8">
            <!-- 9 Holes generated by JS -->
        </div>

        <!-- Bin Controls - 크기 키운 버튼들 -->
        <div class="grid grid-cols-4 sm:grid-cols-4 md:grid-cols-7 gap-3 pb-8" id="controls">
            <button onclick="checkSelection('plastic')" class="bin-btn bg-blue-500 text-white">
                <span class="bin-icon">🥤</span><span class="bin-text">플라스틱</span>
            </button>
            <button onclick="checkSelection('paper')" class="bin-btn bg-yellow-500 text-white">
                <span class="bin-icon">📦</span><span class="bin-text">종이</span>
            </button>
            <button onclick="checkSelection('can')" class="bin-btn bg-gray-500 text-white">
                <span class="bin-icon">🥫</span><span class="bin-text">캔/금속</span>
            </button>
            <button onclick="checkSelection('glass')" class="bin-btn bg-emerald-500 text-white">
                <span class="bin-icon">🍾</span><span class="bin-text">유리</span>
            </button>
            <button onclick="checkSelection('vinyl')" class="bin-btn bg-purple-500 text-white">
                <span class="bin-icon">🛍️</span><span class="bin-text">비닐</span>
            </button>
            <button onclick="checkSelection('styrofoam')" class="bin-btn bg-sky-200 text-blue-800">
                <span class="bin-icon">🧊</span><span class="bin-text">스티로폼</span>
            </button>
            <button onclick="checkSelection('general')" class="bin-btn bg-orange-700 text-white">
                <span class="bin-icon">🗑️</span><span class="bin-text">일반/기타</span>
            </button>
        </div>
    </main>

    <!-- Overlay -->
    <div id="overlay" class="fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center z-50 text-center text-white px-6">
        <div id="start-screen">
            <h2 class="text-4xl mb-4">지구를 지켜라!</h2>
            <p class="mb-6 text-lg">하단 버튼이 더 커져 조작이 쉬워졌습니다.<br>AI와 함께 분리배출 고수가 되어보세요.</p>
            <button onclick="startGame()" class="bg-green-500 hover:bg-green-600 px-10 py-4 rounded-full text-2xl font-bold transition transform hover:scale-105">
                게임 시작
            </button>
        </div>
        
        <div id="game-over-screen" class="hidden w-full max-w-md">
            <h2 class="text-4xl mb-2 text-yellow-400">Time Over!</h2>
            <p class="text-xl mb-4">최종 점수: <span id="final-score" class="text-3xl font-bold">0</span>점</p>
            
            <div id="ai-quiz-container" class="bg-white text-gray-800 p-4 rounded-xl mb-6 shadow-inner hidden">
                <h3 class="font-bold text-green-700 mb-2 border-b pb-1">✨ AI 특별 퀴즈</h3>
                <div id="ai-quiz-content" class="text-sm mb-3">질문을 생성 중입니다...</div>
                <div id="ai-quiz-options" class="grid grid-cols-1 gap-2"></div>
            </div>

            <div id="grade-message" class="mb-6 text-green-300"></div>
            
            <div class="flex flex-col gap-3">
                <button id="gen-quiz-btn" onclick="generateAiQuiz()" class="bg-purple-500 hover:bg-purple-600 px-6 py-3 rounded-full font-bold transition transform hover:scale-105">
                    ✨ AI 분리배출 퀴즈 받기
                </button>
                <button onclick="startGame()" class="bg-blue-500 hover:bg-blue-600 px-6 py-3 rounded-full font-bold transition transform hover:scale-105">
                    다시 도전하기
                </button>
            </div>
        </div>
    </div>

    <script>
        const apiKey = ""; 
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'sorting-master-ai';

        const wasteData = [
            { emoji: '🥤', type: 'plastic', name: '생수병' },
            { emoji: '🧴', type: 'plastic', name: '세제통' },
            { emoji: '📦', type: 'paper', name: '택배박스' },
            { emoji: '📰', type: 'paper', name: '신문' },
            { emoji: '🥫', type: 'can', name: '참치캔' },
            { emoji: '🥤', type: 'can', name: '음료수캔' },
            { emoji: '🍾', type: 'glass', name: '와인병' },
            { emoji: '🥃', type: 'glass', name: '유리컵' },
            { emoji: '🛍️', type: 'vinyl', name: '과자봉지' },
            { emoji: '🍜', type: 'vinyl', name: '라면봉지' },
            { emoji: '🧊', type: 'styrofoam', name: '스티로폼 박스' },
            { emoji: '🥡', type: 'styrofoam', name: '컵라면 용기' },
            { emoji: '🍌', type: 'general', name: '바나나껍질' },
            { emoji: '🚬', type: 'general', name: '담배꽁초' },
            { emoji: '🔋', type: 'general', name: '폐건전지' },
            { emoji: '🧸', type: 'general', name: '헌 인형' }
        ];

        let score = 0;
        let timeLeft = 30;
        let gameTimer;
        let wasteTimer;
        let activeWaste = null;
        let activeHole = null;
        let isGameRunning = false;

        const board = document.getElementById('game-board');
        const scoreDisplay = document.getElementById('score');
        const timerDisplay = document.getElementById('timer');
        const overlay = document.getElementById('overlay');
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const finalScoreDisplay = document.getElementById('final-score');
        const gradeMessage = document.getElementById('grade-message');
        const aiStatus = document.getElementById('ai-status');

        for (let i = 0; i < 9; i++) {
            const hole = document.createElement('div');
            hole.classList.add('hole');
            hole.id = `hole-${i}`;
            const item = document.createElement('div');
            item.classList.add('waste-item');
            item.innerHTML = `<span class="waste-emoji"></span><span class="waste-label"></span>`;
            hole.appendChild(item);
            board.appendChild(hole);
        }

        const holes = document.querySelectorAll('.hole');
        const items = document.querySelectorAll('.waste-item');

        function getRandomHole() {
            const idx = Math.floor(Math.random() * holes.length);
            const hole = holes[idx];
            if (hole === activeHole) return getRandomHole();
            return hole;
        }

        function showWaste() {
            if (!isGameRunning) return;

            const hole = getRandomHole();
            const waste = wasteData[Math.floor(Math.random() * wasteData.length)];
            const itemElement = hole.querySelector('.waste-item');
            const emojiSpan = itemElement.querySelector('.waste-emoji');
            const labelSpan = itemElement.querySelector('.waste-label');

            emojiSpan.textContent = waste.emoji;
            labelSpan.textContent = waste.name;
            itemElement.classList.add('up');
            activeWaste = waste;
            activeHole = hole;

            const upTime = 1000; 

            setTimeout(() => {
                if (itemElement.classList.contains('up') && activeWaste === waste) {
                    itemElement.classList.remove('up');
                }
                if (isGameRunning) {
                    const nextDelay = 1000; 
                    wasteTimer = setTimeout(showWaste, nextDelay);
                }
            }, upTime);
        }

        function checkSelection(type) {
            if (!isGameRunning || !activeWaste) return;

            const itemElement = activeHole.querySelector('.waste-item');
            if (!itemElement.classList.contains('up')) return;

            if (activeWaste.type === type) {
                score += 10;
                showFeedback('+10', 'text-blue-600');
                aiStatus.textContent = `딩동댕! ${activeWaste.name}은(는) ${type}이 정답!`;
            } else {
                score = Math.max(0, score - 5);
                showFeedback('-5', 'text-red-600');
                aiStatus.textContent = `땡! ${activeWaste.name}은(는) ${activeWaste.type}에 버려야 해요.`;
            }

            scoreDisplay.textContent = score;
            itemElement.classList.remove('up');
            activeWaste = null;
        }

        function showFeedback(text, colorClass) {
            const fb = document.createElement('div');
            fb.textContent = text;
            fb.className = `feedback ${colorClass}`;
            fb.style.left = '50%';
            fb.style.top = '30%';
            document.body.appendChild(fb);
            setTimeout(() => fb.remove(), 1000);
        }

        async function geminiCall(prompt, systemInstruction) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                systemInstruction: { parts: [{ text: systemInstruction }] },
                generationConfig: { responseMimeType: "application/json" }
            };

            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });
                    const data = await response.json();
                    return JSON.parse(data.candidates[0].content.parts[0].text);
                } catch (e) {
                    await new Promise(resolve => setTimeout(resolve, Math.pow(2, i) * 1000));
                }
            }
            throw new Error("Gemini API Error");
        }

        async function askAiGuide() {
            if (!activeWaste) {
                aiStatus.textContent = "쓰레기가 올라왔을 때 눌러보세요!";
                return;
            }
            aiStatus.textContent = "✨ AI 가이드 분석 중...";
            try {
                const prompt = `${activeWaste.name}의 분리배출 방법과 주의사항을 한 문장으로 핵심만 알려줘.`;
                const system = "환경 전문가로서 한국어로 답변하세요. JSON { 'answer': '내용' }";
                const result = await geminiCall(prompt, system);
                aiStatus.textContent = `✨ AI: ${result.answer}`;
            } catch (e) { aiStatus.textContent = "AI 연결에 실패했습니다."; }
        }

        async function generateAiQuiz() {
            const btn = document.getElementById('gen-quiz-btn');
            const container = document.getElementById('ai-quiz-container');
            const content = document.getElementById('ai-quiz-content');
            const optionsDiv = document.getElementById('ai-quiz-options');
            
            btn.disabled = true;
            btn.textContent = "✨ 퀴즈 로딩 중...";
            container.classList.remove('hidden');
            content.textContent = "Gemini가 퀴즈를 출제 중입니다...";
            optionsDiv.innerHTML = "";

            try {
                const prompt = `점수 ${score}점에 어울리는 분리배출 관련 퀴즈 하나(객관식)를 생성해줘.`;
                const system = `JSON: { "question": "질문", "options": ["보기1", "보기2", "보기3"], "correctIndex": 0, "explanation": "설명" }`;
                const quiz = await geminiCall(prompt, system);
                
                content.textContent = quiz.question;
                quiz.options.forEach((opt, idx) => {
                    const b = document.createElement('button');
                    b.className = "w-full p-2 bg-green-50 rounded text-left hover:bg-green-100 border border-green-200 transition text-sm";
                    b.textContent = opt;
                    b.onclick = () => {
                        content.innerHTML = `<span class="${idx === quiz.correctIndex ? 'text-blue-600' : 'text-red-600'} font-bold">${idx === quiz.correctIndex ? '정답입니다!' : '오답입니다!'}</span><br>${quiz.explanation}`;
                        optionsDiv.innerHTML = "";
                    };
                    optionsDiv.appendChild(b);
                });
                btn.classList.add('hidden');
            } catch (e) { content.textContent = "오류가 발생했습니다."; btn.disabled = false; }
        }

        function startGame() {
            score = 0; timeLeft = 30; isGameRunning = true;
            scoreDisplay.textContent = score; timerDisplay.textContent = timeLeft;
            aiStatus.textContent = "지구를 위한 올바른 분리배출을 시작하세요!";
            overlay.classList.add('hidden');
            startScreen.classList.add('hidden');
            gameOverScreen.classList.add('hidden');
            document.getElementById('ai-quiz-container').classList.add('hidden');
            document.getElementById('gen-quiz-btn').classList.remove('hidden');
            document.getElementById('gen-quiz-btn').disabled = false;
            gameTimer = setInterval(() => {
                timeLeft--;
                timerDisplay.textContent = timeLeft;
                if (timeLeft <= 0) endGame();
            }, 1000);
            showWaste();
        }

        function endGame() {
            isGameRunning = false;
            clearInterval(gameTimer);
            clearTimeout(wasteTimer);
            items.forEach(item => item.classList.remove('up'));
            overlay.classList.remove('hidden');
            gameOverScreen.classList.remove('hidden');
            finalScoreDisplay.textContent = score;
            gradeMessage.textContent = score >= 120 ? "🌿 당신은 환경 보호 전도사!" : (score >= 60 ? "🌱 환경을 사랑하는 마음이 돋보여요!" : "🌏 우리 조금 더 노력해봐요!");
        }
    </script>
</body>
</html>
